api_key: "YOUR_511_API_KEY"
agency: "SF"
refresh_interval_minutes: 2

stops:
  - stop_code: "15553"
    name: "Church & Duboce"
    walk_minutes: 4
    routes:
      - line: "J"
        direction: "Balboa Park"    # substring match on DestinationName from API
        display_name: "Outbound"    # shown on display (optional, defaults to direction)
      - line: "N"
        direction: "Ocean Beach"
        display_name: "Outbound"
  - stop_code: "13915"
    name: "Haight & Fillmore"
    walk_minutes: 7
    routes:
      - line: "7"
        direction: "Noriega"
        display_name: "Outbound"
      - line: "22"
        direction: "Bay St"
        display_name: "Marina"

thresholds:
  rush_max: 0
  ideal_max: 5
  medium_max: 10

sleep:
  sleep_time: "21:00"   # stop updating at 9pm
  wake_time: "06:00"    # resume at 6am

display:
  simulate: true
  output_path: "output.png"
  saturation: 0.5
  rotation: 0
